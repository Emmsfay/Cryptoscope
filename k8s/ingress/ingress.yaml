apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cryptoscope-ingress
  namespace: cryptoscope
  annotations:
    # Tells the AWS Load Balancer Controller to create an ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # Health check settings
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Enable HTTP to HTTPS redirect (once you add a certificate)
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:...:certificate/...

    # Tags applied to the ALB in AWS console
    alb.ingress.kubernetes.io/tags: Project=cryptoscope,Environment=dev

spec:
  rules:
    - http:
        paths:
          # All traffic goes to the frontend (nginx)
          # nginx itself proxies /api/* to the backend service internally
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
