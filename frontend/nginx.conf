server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy /api calls to the backend service
    # In Docker Compose: resolves to the "backend" container
    # In EKS: resolves to the backend ClusterIP Service
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Health check endpoint — used by load balancer and K8s probes
    location /health {
        proxy_pass http://backend:8000/health;
    }

    # Static assets — long cache since Vite fingerprints filenames
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback — all unknown paths serve index.html
    # This is what makes React Router work in production
    location / {
        try_files $uri $uri/ /index.html;
    }
}